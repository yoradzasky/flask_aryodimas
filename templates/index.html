<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px auto;
            max-width: 800px;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 20px;
        }
        .result {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px;
            border: 2px solid #e0e0e0;
            display: inline-block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .model-select {
            margin-bottom: 20px;
        }
        .btn-submit {
            margin-top: 20px;
            padding: 8px 20px;
            float: right;
            cursor: pointer;
        }
        /* Clearfix untuk mengatasi float button */
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>
    <h1>Diabetes Prediction</h1>
    
    {% if prediction %}
        <div class="result">
            Hasil prediksi: {{ prediction }}
        </div>
    {% endif %}

    <form action="/predict" method="POST" class="clearfix">
        <div class="form-group model-select">
            <label for="model">Model</label>
            <select name="model" id="model" required>
                {% for name in model_names %}
                    <option value="{{ name }}">{{ name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="grid-container">
            <div class="form-group">
                <label for="pregnancies">Pregnancies</label>
                <input type="number" name="pregnancies" id="pregnancies" required>
            </div>
            <div class="form-group">
                <label for="glucose">Glucose</label>
                <input type="number" name="glucose" id="glucose" required>
            </div>
            
            <div class="form-group">
                <label for="blood_pressure">BloodPressure</label>
                <input type="number" name="blood_pressure" id="blood_pressure" required>
            </div>
            <div class="form-group">
                <label for="skin_thickness">SkinThickness</label>
                <input type="number" name="skin_thickness" id="skin_thickness" required>
            </div>
            
            <div class="form-group">
                <label for="insulin">Insulin</label>
                <input type="number" name="insulin" id="insulin" required>
            </div>
            <div class="form-group">
                <label for="bmi">BMI</label>
                <input type="number" step="any" name="bmi" id="bmi" required>
            </div>
            
            <div class="form-group">
                <label for="diabetes_pedigree_function">DiabetesPedigreeFunction</label>
                <input type="number" step="any" name="diabetes_pedigree_function" id="diabetes_pedigree_function" required>
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" name="age" id="age" required>
            </div>
        </div>

        <button type="submit" class="btn-submit">Predict</button>
    </form>
</body>
</html>
